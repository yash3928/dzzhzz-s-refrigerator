<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#fffaf3" />
<title>냉장고 관리 v0.2</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Pretendard,sans-serif;color:#2b241f;background:#f8f5f1}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;background:linear-gradient(180deg,#fffaf3 0%,#f7f4ef 35%,#f4f2ee 100%)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{width:min(760px,100%);margin:0 auto;padding:20px 16px 80px}.hero{padding:18px 4px 10px}.brand{display:flex;align-items:center;gap:12px}.brand-icon{width:48px;height:48px;display:grid;place-items:center;border-radius:16px;color:#fff;background:#d87845;font-size:25px;box-shadow:0 10px 25px rgba(216,120,69,.24)}.eyebrow{margin:0 0 2px;font-size:11px;font-weight:800;letter-spacing:.16em;color:#9c765f}h1{margin:0;font-size:26px}.save{margin-left:auto;font-size:12px;color:#4f7d5c;background:#edf7ef;border:1px solid #d6eadb;border-radius:999px;padding:7px 10px}.save.error{color:#b94d42;background:#fff0ee;border-color:#f1d4cf}.copy{color:#756960;margin:14px 0 18px;font-size:14px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.summary article{display:grid;gap:4px;padding:14px;border:1px solid #eadfd4;background:rgba(255,255,255,.78);border-radius:18px;box-shadow:0 8px 24px rgba(75,55,40,.05)}.summary .ico{font-size:20px}.summary strong{font-size:22px}.summary span{color:#81746a;font-size:12px}.toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:18px}.search{display:flex;align-items:center;gap:8px;border:1px solid #e4d8cd;background:#fff;border-radius:14px;padding:0 12px}.search input{width:100%;border:0;outline:0;padding:13px 0;background:transparent}.search button{border:0;background:transparent;color:#8f837a}.primary,.secondary{border-radius:14px;padding:12px 16px;border:0;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:750}.primary{background:#cb7040;color:#fff;box-shadow:0 8px 18px rgba(203,112,64,.18)}.secondary{background:#eee8e2;color:#665c55}.filters{display:flex;gap:8px;overflow-x:auto;padding:14px 0 6px}.filters button{border:1px solid #e5d9ce;background:rgba(255,255,255,.65);color:#786b62;border-radius:999px;padding:8px 15px}.filters button.active{background:#392f2a;color:#fff;border-color:#392f2a}.card{margin-top:16px;border:1px solid #eadfd5;background:rgba(255,255,255,.88);border-radius:22px;padding:18px;box-shadow:0 14px 34px rgba(73,53,38,.06)}.title,.title>div,.list-head{display:flex;align-items:center;justify-content:space-between}.title>div{gap:8px;justify-content:flex-start}.title h2,.list-head h2{margin:0;font-size:18px}.icon-btn{border:0;background:#f1ece7;width:36px;height:36px;border-radius:12px;display:grid;place-items:center}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;margin-top:16px}.form-grid label{display:grid;gap:7px;color:#675c54;font-size:13px;font-weight:700}.form-grid .wide{grid-column:1/-1}input,select,textarea{width:100%;border:1px solid #dfd4cb;background:#fff;border-radius:12px;padding:11px 12px;color:#2b241f;outline:none}input:focus,select:focus,textarea:focus{border-color:#cf7b4d;box-shadow:0 0 0 3px rgba(207,123,77,.1)}textarea{resize:vertical}.actions{display:flex;justify-content:flex-end;gap:9px;margin-top:16px}.list-head span{color:#8c7f75;font-size:13px}.item-list{display:grid;gap:10px;margin-top:14px}.item{display:flex;align-items:stretch;gap:12px;border:1px solid #ece3db;background:#fff;border-radius:17px;padding:14px}.item-main{min-width:0;flex:1}.topline{display:flex;align-items:center;justify-content:space-between;gap:10px}.chip,.expiry{display:inline-flex;align-items:center;border-radius:999px;font-size:11px;font-weight:750;padding:5px 8px}.chip.cat{background:#f7eadf;color:#ad5f37;margin-right:5px}.chip.storage{background:#eaf2f5;color:#477080}.expiry.safe{background:#eaf6ed;color:#3f7450}.expiry.warning{background:#fff4d8;color:#95690a}.expiry.danger{background:#fff0ed;color:#b64d40}.expiry.muted{background:#f0eeeb;color:#847a73}.item h3{margin:11px 0 5px;font-size:18px}.meta,.memo{margin:0;color:#7a6d64;font-size:13px}.memo{margin-top:8px;padding-top:8px;border-top:1px dashed #ece3dc;white-space:pre-wrap}.item-actions{display:flex;flex-direction:column;gap:7px}.item-actions button{width:36px;height:36px;border:0;border-radius:11px;background:#f1ece7;color:#625850}.item-actions .delete{color:#b34c41;background:#fff0ee}.empty{min-height:230px;display:grid;place-items:center;align-content:center;text-align:center;color:#aa9d93}.empty .big{font-size:42px}.empty h3{color:#665c55;margin:13px 0 4px}.empty p{margin:0;font-size:13px}.hidden{display:none!important}.notice{margin-top:10px;font-size:12px;color:#8b7769}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#302824;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}
@media(max-width:560px){.app{padding:14px 12px 60px}.toolbar{grid-template-columns:1fr}.toolbar .primary{width:100%}.summary article{padding:12px 10px}.summary strong{font-size:20px}.save{padding:6px 8px;font-size:11px}.form-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main class="app">
<header class="hero"><div class="brand"><div class="brand-icon">❄️</div><div><p class="eyebrow">MY KITCHEN</p><h1>냉장고 관리</h1></div><span id="saveState" class="save">✓ 저장 완료</span></div><p class="copy">식재료와 유통기한을 한곳에서 간단하게 관리하세요.</p><section class="summary"><article><span class="ico">📦</span><strong id="sumTotal">0</strong><span>전체 식재료</span></article><article><span class="ico">📅</span><strong id="sumSoon">0</strong><span>3일 이내</span></article><article><span class="ico">⚠️</span><strong id="sumExpired">0</strong><span>기한 지남</span></article></section></header>
<section class="toolbar"><label class="search"><span>🔎</span><input id="searchInput" placeholder="식재료 검색"><button id="clearSearch" type="button" aria-label="검색어 지우기">✕</button></label><button id="addButton" class="primary" type="button">＋ 식재료 추가</button></section>
<nav id="filters" class="filters"><button class="active" data-value="전체">전체</button><button data-value="냉장">냉장</button><button data-value="냉동">냉동</button><button data-value="실온">실온</button></nav>
<section id="formCard" class="card hidden"><div class="title"><div><span>🏷️</span><h2 id="formTitle">식재료 등록</h2></div><button id="closeForm" class="icon-btn" type="button">✕</button></div><form id="itemForm"><div class="form-grid"><label class="wide">품목명<input id="name" required placeholder="예: 계란"></label><label>분류<select id="category"><option>채소</option><option>과일</option><option>육류</option><option>수산물</option><option>유제품</option><option>가공식품</option><option>음료</option><option>기타</option></select></label><label>보관 위치<select id="storage"><option>냉장</option><option>냉동</option><option>실온</option></select></label><label>수량<input id="quantity" type="number" min="0" step="0.1" value="1"></label><label>단위<select id="unit"><option>개</option><option>봉</option><option>팩</option><option>병</option><option>캔</option><option>g</option><option>kg</option><option>ml</option><option>L</option></select></label><label class="wide">유통기한<input id="expiryDate" type="date"></label><label class="wide">메모<textarea id="memo" rows="3" placeholder="구매처, 용도 등을 기록하세요."></textarea></label></div><div class="actions"><button id="cancelForm" type="button" class="secondary">취소</button><button class="primary" type="submit">✓ <span id="submitText">등록 저장</span></button></div></form><p class="notice">입력 내용은 이 기기의 브라우저에 자동 저장됩니다.</p></section>
<section class="card"><div class="list-head"><h2>식재료 목록</h2><span id="listCount">0개</span></div><div id="empty" class="empty"><div class="big">🧊</div><h3>등록된 식재료가 없습니다</h3><p>식재료를 추가하면 자동으로 저장됩니다.</p></div><div id="itemList" class="item-list"></div></section>
</main><div id="toast" class="toast"></div>
<script>
(function(){
'use strict';
const KEY='fridge-manager-items-v2';
const el=id=>document.getElementById(id);
let items=[];let editingId=null;let filter='전체';let query='';
function uid(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function load(){try{const raw=localStorage.getItem(KEY);items=raw?JSON.parse(raw):[];if(!Array.isArray(items))items=[]}catch(e){items=[];showSave('저장 데이터 오류',true)}}
function save(){try{showSave('저장 중...');localStorage.setItem(KEY,JSON.stringify(items));setTimeout(()=>showSave('저장 완료'),180)}catch(e){showSave('저장 실패',true);toast('브라우저 저장 공간을 확인하세요.')}}
function showSave(text,error){const s=el('saveState');s.textContent=(error?'⚠ ':'✓ ')+text;s.classList.toggle('error',!!error)}
function toast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
function daysUntil(str){if(!str)return null;const today=new Date();today.setHours(0,0,0,0);const d=new Date(str+'T00:00:00');return Math.ceil((d-today)/86400000)}
function expiryInfo(str){const d=daysUntil(str);if(d===null)return['기한 미설정','muted'];if(d<0)return[Math.abs(d)+'일 지남','danger'];if(d===0)return['오늘까지','danger'];if(d<=3)return[d+'일 남음','warning'];return[d+'일 남음','safe']}
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function render(){
 const visible=items.filter(i=>filter==='전체'||i.storage===filter).filter(i=>(i.name+' '+i.category+' '+(i.memo||'')).toLowerCase().includes(query.toLowerCase())).sort((a,b)=>(a.expiryDate||'9999').localeCompare(b.expiryDate||'9999'));
 el('sumTotal').textContent=items.length;el('sumSoon').textContent=items.filter(i=>{const d=daysUntil(i.expiryDate);return d!==null&&d>=0&&d<=3}).length;el('sumExpired').textContent=items.filter(i=>{const d=daysUntil(i.expiryDate);return d!==null&&d<0}).length;el('listCount').textContent=visible.length+'개';el('empty').classList.toggle('hidden',visible.length!==0);
 el('itemList').innerHTML=visible.map(i=>{const ex=expiryInfo(i.expiryDate);return `<article class="item"><div class="item-main"><div class="topline"><div><span class="chip cat">${esc(i.category)}</span><span class="chip storage">${esc(i.storage)}</span></div><span class="expiry ${ex[1]}">${ex[0]}</span></div><h3>${esc(i.name)}</h3><p class="meta">${esc(i.quantity||0)}${esc(i.unit)}${i.expiryDate?' · '+esc(i.expiryDate):''}</p>${i.memo?`<p class="memo">${esc(i.memo)}</p>`:''}</div><div class="item-actions"><button data-edit="${esc(i.id)}" title="수정">✏️</button><button class="delete" data-delete="${esc(i.id)}" title="삭제">🗑️</button></div></article>`}).join('');
 document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>edit(b.dataset.edit));document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>remove(b.dataset.delete));
}
function openForm(item){editingId=item?item.id:null;el('formTitle').textContent=item?'식재료 수정':'식재료 등록';el('submitText').textContent=item?'수정 저장':'등록 저장';el('name').value=item?.name||'';el('category').value=item?.category||'채소';el('storage').value=item?.storage||'냉장';el('quantity').value=item?.quantity||'1';el('unit').value=item?.unit||'개';el('expiryDate').value=item?.expiryDate||'';el('memo').value=item?.memo||'';el('formCard').classList.remove('hidden');setTimeout(()=>el('name').focus(),50);window.scrollTo({top:0,behavior:'smooth'})}
function closeForm(){editingId=null;el('itemForm').reset();el('quantity').value='1';el('formCard').classList.add('hidden')}
function edit(id){const item=items.find(i=>i.id===id);if(item)openForm(item)}
function remove(id){if(!confirm('이 식재료를 삭제할까요?'))return;items=items.filter(i=>i.id!==id);save();render();toast('삭제했습니다.')}
el('itemForm').addEventListener('submit',e=>{e.preventDefault();const name=el('name').value.trim();if(!name){toast('품목명을 입력하세요.');return}const data={name,category:el('category').value,storage:el('storage').value,quantity:el('quantity').value,unit:el('unit').value,expiryDate:el('expiryDate').value,memo:el('memo').value.trim(),updatedAt:Date.now()};if(editingId){items=items.map(i=>i.id===editingId?{...i,...data}:i);toast('수정했습니다.')}else{items.push({id:uid(),...data,createdAt:Date.now()});toast('등록했습니다.')}save();closeForm();render()});
el('addButton').onclick=()=>openForm();el('closeForm').onclick=closeForm;el('cancelForm').onclick=closeForm;el('searchInput').oninput=e=>{query=e.target.value.trim();render()};el('clearSearch').onclick=()=>{el('searchInput').value='';query='';render()};el('filters').onclick=e=>{const b=e.target.closest('button');if(!b)return;filter=b.dataset.value;document.querySelectorAll('#filters button').forEach(x=>x.classList.toggle('active',x===b));render()};
load();render();
})();
</script>
</body></html>
